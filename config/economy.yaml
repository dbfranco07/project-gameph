# Bounties, passive income, regen, and last-hit sharing.

hero_kill_gold: 200
hero_kill_xp: 150
passive_gold_per_sec: 2.0
mana_regen_per_sec: 5.0
hero_hp_regen_per_sec: 3.0    # default slow hp regen (heroes may override)

# Gold for the killer when a structure falls
structure_gold: 150

# Last-hit economy: killer gets full gold; nearby allies get a share of gold but
# full XP regardless of who landed the killing blow.
minion_assist_gold_fraction: 0.40
gold_share_radius: 400        # allies within this of a dying minion get share gold
xp_share_radius: 400          # allies within this of a dying minion get full XP
